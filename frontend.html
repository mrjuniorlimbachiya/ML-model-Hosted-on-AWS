<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Damage Detection AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .upload-area {
      border: 2px dashed rgba(167,139,250,0.4);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(167,139,250,0.05);
      position: relative;
    }

    .upload-area:hover {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.1);
    }

    .upload-area.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.1);
      transform: scale(1.02);
    }

    .upload-icon { font-size: 3rem; margin-bottom: 12px; }

    .upload-area p {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
    }

    .upload-area span {
      color: #a78bfa;
      font-weight: 600;
    }

    #fileInput { display: none; }

    #preview {
      display: none;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #preview img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loader {
      display: none;
      text-align: center;
      margin-top: 24px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      display: none;
      margin-top: 24px;
      border-radius: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .result-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .badge.damaged    { background: rgba(239,68,68,0.2);  color: #f87171; border: 1px solid #f87171; }
    .badge.no_damage  { background: rgba(34,197,94,0.2);  color: #4ade80; border: 1px solid #4ade80; }
    .badge.unknown    { background: rgba(234,179,8,0.2);  color: #facc15; border: 1px solid #facc15; }

    .confidence-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .confidence-bar {
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      transition: width 1s ease;
    }

    .meta {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      line-height: 1.8;
    }

    .error {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔍 Damage Detection AI</h1>
  <p class="subtitle">Upload an image to analyse damage using AWS Lambda</p>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">🖼️</div>
    <p><span>Click to upload</span> or drag & drop</p>
    <p style="margin-top:6px; font-size:0.8rem;">PNG, JPG, JPEG supported</p>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

  <div id="preview">
    <img id="previewImg" src="" alt="Preview" />
  </div>

  <button class="btn" id="analyseBtn" disabled>Analyse Image</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p style="color:rgba(255,255,255,0.5); font-size:0.9rem;">Analysing with AWS Lambda...</p>
  </div>

  <div class="result" id="result">
    <div class="result-header">Analysis Result</div>
    <div id="badge" class="badge"></div>
    <div class="confidence-label">Confidence: <span id="confText"></span></div>
    <div class="confidence-bar">
      <div class="confidence-fill" id="confBar" style="width:0%"></div>
    </div>
    <div class="meta">
      <div>🆔 ID: <span id="predId"></span></div>
      <div>🕐 Time: <span id="predTime"></span></div>
    </div>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  const API_URL = "https://nwp613e5lb.execute-api.eu-north-1.amazonaws.com/dev/predict";

  const uploadArea  = document.getElementById("uploadArea");
  const fileInput   = document.getElementById("fileInput");
  const preview     = document.getElementById("preview");
  const previewImg  = document.getElementById("previewImg");
  const analyseBtn  = document.getElementById("analyseBtn");
  const loader      = document.getElementById("loader");
  const result      = document.getElementById("result");
  const errorDiv    = document.getElementById("error");

  let base64Image = null;

  // Click to upload
  uploadArea.addEventListener("click", () => fileInput.click());

  // Drag and drop
  uploadArea.addEventListener("dragover", e => {
    e.preventDefault();
    uploadArea.classList.add("dragover");
  });
  uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
  uploadArea.addEventListener("drop", e => {
    e.preventDefault();
    uploadArea.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      base64Image = dataUrl.split(",")[1]; // strip the data:image/...;base64, prefix
      previewImg.src = dataUrl;
      preview.style.display = "block";
      analyseBtn.disabled = false;
      result.style.display = "none";
      errorDiv.style.display = "none";
    };
    reader.readAsDataURL(file);
  }

  analyseBtn.addEventListener("click", async () => {
    if (!base64Image) return;

    // Reset UI
    loader.style.display = "block";
    result.style.display = "none";
    errorDiv.style.display = "none";
    analyseBtn.disabled = true;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: base64Image })
      });

      const data = await response.json();
      loader.style.display = "none";

      if (data.predicted_class) {
        // Badge
        const badge = document.getElementById("badge");
        badge.textContent = data.predicted_class.replace("_", " ").toUpperCase();
        badge.className = `badge ${data.predicted_class}`;

        // Confidence
        const pct = Math.round(data.confidence * 100);
        document.getElementById("confText").textContent = `${pct}%`;
        document.getElementById("confBar").style.width = `${pct}%`;

        // Meta
        document.getElementById("predId").textContent = data.prediction_id;
        document.getElementById("predTime").textContent =
          new Date(data.timestamp).toLocaleString();

        result.style.display = "block";
      } else {
        throw new Error(data.error || "Unexpected response from server");
      }
    } catch (err) {
      loader.style.display = "none";
      errorDiv.textContent = `Error: ${err.message}`;
      errorDiv.style.display = "block";
    }

    analyseBtn.disabled = false;
  });
</script>
</body>
</html>
